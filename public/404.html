<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not Found</title>
    <meta name="robots" content="noindex" />
    <script>
      // GitHub Pages returns 404.html for unknown client routes.
      // Redirect back to the SPA entry so React Router can handle it.
      window.location.replace('./');
    </script>
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0; url=./" />
    </noscript>
  </body>
</html>
